<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'">
    <title>Configurações Avançadas — AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5YQQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores"><i class="fas fa-user-md"></i> Colaboradores</a>
                <a href="/configuracoes"><i class="fas fa-cog"></i> WhatsApp</a>
                <a href="/configuracoes-avancadas" class="active"><i class="fas fa-sliders-h"></i> Avançado</a>
            </nav>
            <div class="sidebar-footer"><p>© 2026 AgendaPro</p></div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Configurações Avançadas</h1>
                <div class="user-info">
                    <span>Olá, <strong id="userName">...</strong></span>
                    <i class="fas fa-user-circle"></i>
                    <button onclick="logout()" style="background:none;border:none;color:#dc3545;margin-left:10px;cursor:pointer;" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="cards">
                <div class="card">
                    <h3>Notificações</h3>
                    <div class="form-group">
                        <label>Enviar lembrete quantas horas antes?</label>
                        <input type="number" id="lembrete_horas" min="1" max="72" value="24">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="notif_cliente" checked>
                            Notificar cliente por WhatsApp
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h3>Cancelamentos</h3>
                    <div class="form-group">
                        <label>Cancelamento sem custo até (horas antes):</label>
                        <input type="number" id="cancelamento_horas" min="0" max="72" value="2">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="notif_empresa" checked>
                            Notificar empresa quando cliente cancelar
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h3>Agendamento Recorrente</h3>
                    <div class="form-group">
                        <label>Permitir agendamento recorrente?</label>
                        <select id="permitir_recorrente">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="salvarConfiguracoes()"
                style="width:auto;margin-top:20px;padding:12px 24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">
                <i class="fas fa-save"></i> Salvar todas as configurações
            </button>
        </main>
    </div>

    <script src="/js/security.js"></script>
    <script>
        'use strict';

        // CORRIGI M-04: verificar autenticação
        verificarAuth().then(user => { if (user) carregarConfiguracoes(); });

        async function carregarConfiguracoes() {
            try {
                // CORRIGI B-04: endpoint correto é GET /api/configuracoes (retorna objeto com todas as chaves)
                const r = await fetch('/api/configuracoes');
                if (!r.ok) return;
                const cfg = await r.json();

                // Os nomes das chaves no backend são: lembrete_horas, cancelamento_horas, notif_cliente, notif_empresa, permitir_recorrente
                const lh = document.getElementById('lembrete_horas');
                const ch = document.getElementById('cancelamento_horas');
                const nc = document.getElementById('notif_cliente');
                const ne = document.getElementById('notif_empresa');
                const pr = document.getElementById('permitir_recorrente');

                if (lh) lh.value = cfg.lembrete_horas || '24';
                if (ch) ch.value = cfg.cancelamento_horas || '2';
                if (nc) nc.checked = cfg.notif_cliente !== 'nao';
                if (ne) ne.checked = cfg.notif_empresa !== 'nao';
                if (pr) pr.value = cfg.permitir_recorrente || 'sim';
            } catch (e) {
                console.error('Erro ao carregar configurações');
            }
        }

        async function salvarConfiguracoes() {
            const payload = {
                lembrete_horas: document.getElementById('lembrete_horas').value,
                cancelamento_horas: document.getElementById('cancelamento_horas').value,
                notif_cliente: document.getElementById('notif_cliente').checked ? 'sim' : 'nao',
                notif_empresa: document.getElementById('notif_empresa').checked ? 'sim' : 'nao',
                permitir_recorrente: document.getElementById('permitir_recorrente').value
            };

            try {
                // CORRIGI B-04: endpoint correto é PUT /api/configuracoes
                const r = await fetch('/api/configuracoes', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await r.json();
                if (!r.ok) { toast(data.erro || 'Erro ao salvar', 'erro'); return; }
                toast('Configurações salvas com sucesso!', 'sucesso');
            } catch (e) {
                toast('Erro de conexão', 'erro');
            }
        }
    </script>
</body>
</html>
