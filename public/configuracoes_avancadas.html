<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações Avançadas - AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores"><i class="fas fa-user-md"></i> Colaboradores</a>
                <a href="/configuracoes"><i class="fas fa-cog"></i> WhatsApp</a>
                <a href="/configuracoes-avancadas" class="active"><i class="fas fa-sliders-h"></i> Avançado</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>⚙️ Configurações Avançadas</h1>
                <div class="user-info">
                    <span>Olá, <strong>Administrador</strong></span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <div class="cards">
                <div class="card">
                    <h3>Notificações</h3>
                    <div class="form-group">
                        <label>Enviar lembrete quantas horas antes?</label>
                        <input type="number" id="notificacao_lembrete_horas" min="1" max="72" value="24">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="notificar_cliente_lembrete" checked>
                            Notificar cliente por WhatsApp
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h3>Cancelamentos</h3>
                    <div class="form-group">
                        <label>Cancelamento sem custo até (horas antes):</label>
                        <input type="number" id="cancelamento_sem_custo_horas" min="0" max="72" value="2">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="notificar_empresa_cancelamento" checked>
                            Notificar empresa quando cliente cancelar
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h3>Agendamento Recorrente</h3>
                    <div class="form-group">
                        <label>Permitir agendamento recorrente?</label>
                        <select id="permitir_recorrente">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="salvarConfiguracoes()" class="btn-submit" style="width:auto; margin-top:20px;">
                Salvar todas as configurações
            </button>
        </main>
    </div>

    <script>
        async function carregarConfiguracoes() {
            const chaves = [
                'notificacao_lembrete_horas',
                'cancelamento_sem_custo_horas',
                'notificar_cliente_lembrete',
                'notificar_empresa_cancelamento',
                'permitir_recorrente'
            ];
            for (const chave of chaves) {
                const response = await fetch(`/api/configuracoes/${chave}`);
                const data = await response.json();
                const el = document.getElementById(chave);
                if (el) {
                    if (el.type === 'checkbox') {
                        el.checked = data.valor === 'sim';
                    } else {
                        el.value = data.valor || '';
                    }
                }
            }
        }

        async function salvarConfiguracoes() {
            const configuracoes = [
                { chave: 'notificacao_lembrete_horas', valor: document.getElementById('notificacao_lembrete_horas').value },
                { chave: 'cancelamento_sem_custo_horas', valor: document.getElementById('cancelamento_sem_custo_horas').value },
                { chave: 'notificar_cliente_lembrete', valor: document.getElementById('notificar_cliente_lembrete').checked ? 'sim' : 'nao' },
                { chave: 'notificar_empresa_cancelamento', valor: document.getElementById('notificar_empresa_cancelamento').checked ? 'sim' : 'nao' },
                { chave: 'permitir_recorrente', valor: document.getElementById('permitir_recorrente').value }
            ];
            for (const config of configuracoes) {
                await fetch('/api/configuracoes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
            }
            alert('✅ Configurações salvas com sucesso!');
        }

        carregarConfiguracoes();
    </script>
</body>
</html>
