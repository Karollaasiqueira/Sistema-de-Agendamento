<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: lh3.googleusercontent.com; connect-src 'self'">
    <title>Dashboard — AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5YQQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/" class="active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores"><i class="fas fa-user-md"></i> Colaboradores</a>
                <a href="/cliente" style="background:#25d366;color:white;">
                    <i class="fab fa-whatsapp"></i> Cliente WhatsApp
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2026 AgendaPro</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span>Olá, <strong id="userName">...</strong></span>
                    <i class="fas fa-user-circle"></i>
                    <!-- CORRIGI A-05: função logout() agora definida neste arquivo -->
                    <button onclick="logout()" style="background:none;border:none;color:#dc3545;margin-left:10px;cursor:pointer;" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="cards">
                <div class="card" onclick="window.location.href='/clientes'" style="cursor:pointer;">
                    <div class="card-icon blue"><i class="fas fa-users"></i></div>
                    <div class="card-info">
                        <h3 id="totalClientes">-</h3>
                        <p>Total de Clientes</p>
                    </div>
                </div>
                <div class="card" onclick="window.location.href='/agendamentos'" style="cursor:pointer;">
                    <div class="card-icon green"><i class="fas fa-calendar-check"></i></div>
                    <div class="card-info">
                        <h3 id="agendamentosHoje">-</h3>
                        <p>Agendamentos Hoje</p>
                    </div>
                </div>
                <div class="card" onclick="window.location.href='/agendamentos'" style="cursor:pointer;">
                    <div class="card-icon orange"><i class="fas fa-clock"></i></div>
                    <div class="card-info">
                        <h3 id="agendamentosPendentes">-</h3>
                        <p>Pendentes</p>
                    </div>
                </div>
                <div class="card" onclick="window.location.href='/servicos'" style="cursor:pointer;">
                    <div class="card-icon purple"><i class="fas fa-tag"></i></div>
                    <div class="card-info">
                        <h3 id="totalServicos">-</h3>
                        <p>Serviços</p>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>Próximos Agendamentos</h2>
                    <a href="/agendamentos" class="btn-view-all">Ver todos <i class="fas fa-arrow-right"></i></a>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Serviço</th>
                                <th>Data</th>
                                <th>Hora</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaAgendamentos">
                            <tr><td colspan="5" class="text-center">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/security.js"></script>
    <script>
        'use strict';

        // CORRIGI M-04: verificar autenticação antes de carregar dados
        verificarAuth().then(user => {
            if (user) {
                carregarDashboard();
                carregarAgendamentos();
                setInterval(() => {
                    carregarDashboard();
                    carregarAgendamentos();
                }, 30000);
            }
        });

        async function carregarDashboard() {
            try {
                const r = await fetch('/api/dashboard');
                if (!r.ok) return;
                const data = await r.json();
                // CORRIGI C-02: usando textContent em vez de innerHTML
                document.getElementById('totalClientes').textContent = data.total_clientes ?? '-';
                document.getElementById('agendamentosHoje').textContent = data.agendamentos_hoje ?? '-';
                document.getElementById('agendamentosPendentes').textContent = data.agendamentos_pendentes ?? '-';
                document.getElementById('totalServicos').textContent = data.total_servicos ?? '-';
            } catch (e) {
                console.error('Erro ao carregar dashboard');
            }
        }

        async function carregarAgendamentos() {
            const tbody = document.getElementById('tabelaAgendamentos');
            try {
                const r = await fetch('/api/agendamentos');
                if (!r.ok) return;
                const agendamentos = await r.json();

                const hoje = new Date().toISOString().split('T')[0];
                const proximos = agendamentos
                    .filter(a => a.data_agendamento >= hoje)
                    .slice(0, 5);

                if (proximos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhum agendamento próximo</td></tr>';
                    return;
                }

                // CORRIGI C-02: esc() em todos os dados dinâmicos
                tbody.innerHTML = proximos.map(a => {
                    const statusSeg = statusSeguro(a.status);
                    return `<tr>
                        <td>${esc(a.cliente_nome)}</td>
                        <td>${esc(a.servico_nome)}</td>
                        <td>${esc(new Date(a.data_agendamento).toLocaleDateString('pt-BR'))}</td>
                        <td>${esc(a.hora_agendamento)}</td>
                        <td><span class="status status-${statusSeg}">${esc(a.status)}</span></td>
                    </tr>`;
                }).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Erro ao carregar dados</td></tr>';
            }
        }
    </script>
</body>
</html>
