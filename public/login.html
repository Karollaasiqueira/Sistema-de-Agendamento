<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .logo i {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 600;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #999;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn-submit:hover {
            transform: scale(1.02);
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .alert {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
        }
        
        .info-box {
            background: #e3f2fd;
            color: #0d47a1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-calendar-check"></i>
            <h1>AgendaPro</h1>
            <p>Sistema de Agendamento Profissional</p>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="mostrarTab('login')">Entrar</div>
                <div class="tab" onclick="mostrarTab('cadastro')">Cadastrar</div>
            </div>

            <div id="alert" class="alert"></div>

            <!-- FORMULÁRIO DE LOGIN -->
            <form id="loginForm" onsubmit="fazerLogin(event)">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i> Demo: admin@agendapro.com / admin123
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" value="admin@agendapro.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" value="admin123" required>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                <div class="link">
                    <a onclick="mostrarTab('cadastro')">Ainda não tem conta? Cadastre-se</a>
                </div>
            </form>

            <!-- FORMULÁRIO DE CADASTRO -->
            <form id="cadastroForm" style="display:none;" onsubmit="fazerCadastro(event)">
                <h3 style="margin-bottom:15px; color:#333;">Dados do Responsável</h3>
                
                <div class="form-group">
                    <label>Nome Completo *</label>
                    <input type="text" id="cadNome" required>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="cadEmail" required>
                </div>
                
                <div class="form-group">
                    <label>Senha *</label>
                    <input type="password" id="cadSenha" required>
                </div>
                
                <div class="form-group">
                    <label>Confirmar Senha *</label>
                    <input type="password" id="cadConfirmaSenha" required>
                </div>
                
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="cadTelefone" placeholder="(11) 99999-9999">
                </div>

                <h3 style="margin: 20px 0 15px; color:#333;">Dados da Empresa</h3>

                <div class="form-group">
                    <label>Nome da Empresa *</label>
                    <input type="text" id="cadNomeEmpresa" required>
                </div>
                
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="cadCnpj" placeholder="00.000.000/0000-00">
                </div>
                
                <div class="form-group">
                    <label>Atividade Principal</label>
                    <select id="cadAtividade">
                        <option value="">Selecione...</option>
                        <option value="massoterapia">Massoterapia</option>
                        <option value="estetica">Estética</option>
                        <option value="saude">Saúde</option>
                        <option value="bem-estar">Bem-estar</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" style="margin-top:20px;">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
                
                <div class="link">
                    <a onclick="mostrarTab('login')">Já tem conta? Faça login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function mostrarTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('loginForm');
            const cadastroForm = document.getElementById('cadastroForm');
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.style.display = 'block';
                cadastroForm.style.display = 'none';
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                cadastroForm.style.display = 'block';
            }
            
            document.getElementById('alert').style.display = 'none';
        }

        function mostrarAlerta(mensagem, tipo = 'erro') {
            const alert = document.getElementById('alert');
            alert.textContent = mensagem;
            alert.className = 'alert ' + (tipo === 'sucesso' ? 'success' : '');
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        async function fazerLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarAlerta(data.erro || 'Erro ao fazer login');
                    return;
                }

                mostrarAlerta('✅ Login realizado! Redirecionando...', 'sucesso');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                mostrarAlerta('Erro de conexão com o servidor');
            }
        }

        async function fazerCadastro(event) {
            event.preventDefault();

            const nome = document.getElementById('cadNome').value;
            const email = document.getElementById('cadEmail').value;
            const senha = document.getElementById('cadSenha').value;
            const confirma = document.getElementById('cadConfirmaSenha').value;
            const telefone = document.getElementById('cadTelefone').value;
            const nome_empresa = document.getElementById('cadNomeEmpresa').value;
            const cnpj = document.getElementById('cadCnpj').value;
            const atividade = document.getElementById('cadAtividade').value;

            if (senha !== confirma) {
                mostrarAlerta('As senhas não conferem');
                return;
            }

            if (senha.length < 4) {
                mostrarAlerta('A senha deve ter pelo menos 4 caracteres');
                return;
            }

            try {
                const response = await fetch('/api/auth/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome, email, senha, telefone,
                        nome_empresa, cnpj, atividade
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarAlerta(data.erro || 'Erro ao cadastrar');
                    return;
                }

                mostrarAlerta('✅ Cadastro realizado! Faça o login.', 'sucesso');
                setTimeout(() => mostrarTab('login'), 2000);
            } catch (error) {
                mostrarAlerta('Erro de conexão com o servidor');
            }
        }
    </script>
</body>
</html>
