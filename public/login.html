<!DOCTYPE html>
<html lang="pt-br">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: lh3.googleusercontent.com; connect-src 'self'">
    <title>Login — AgendaPro</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 440px; width: 100%; }
        .logo { text-align: center; margin-bottom: 30px; color: white; }
        .logo i { font-size: 56px; margin-bottom: 10px; display: block; }
        .logo h1 { font-size: 30px; font-weight: 600; }
        .logo p { font-size: 14px; opacity: .85; margin-top: 4px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,.2);
            text-align: center;
        }
        .card h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
        .card p { font-size: 14px; color: #666; margin-bottom: 32px; line-height: 1.5; }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
            font-family: 'Poppins', sans-serif;
        }
        .btn-google:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102,126,234,.2);
            transform: translateY(-1px);
        }
        .btn-google img { width: 22px; height: 22px; }
        .divider {
            margin: 28px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .seguranca {
            margin-top: 28px;
            padding: 14px;
            background: #f0f4ff;
            border-radius: 8px;
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
        .seguranca i { color: #667eea; margin-right: 4px; }
        .erro-box {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

            </a>

            <div class="divider">acesso seguro</div>

            <div class="seguranca">
                <i class="fas fa-shield-alt"></i>
                Login protegido via Google OAuth 2.0. Suas credenciais nunca são armazenadas neste sistema.
            </div>
        </div>
    </div>

    <script>
        // Verificar se há erro de autenticação na URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('erro') === 'auth') {
            const box = document.getElementById('erroBox');
            box.textContent = 'Erro ao autenticar com o Google. Tente novamente.';
            box.style.display = 'block';
        }

        // Se já estiver autenticado, redirecionar
        fetch('/api/auth/me').then(r => {
            if (r.ok) window.location.href = '/';
        }).catch(() => {});
    </script>
</body>
</html>
