<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaPro — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.6rem;
            color: #2d3748;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 36px;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .btn-google:hover {
            border-color: #667eea;
            box-shadow: 0 4px 16px rgba(102,126,234,0.3);
            transform: translateY(-1px);
        }

        .btn-google svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .divider {
            margin: 28px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .info {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 14px;
            color: #4a5568;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .info strong { color: #667eea; }

        .error-msg {
            display: none;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 10px;
            padding: 12px;
            color: #c53030;
            font-size: 0.88rem;
            margin-bottom: 20px;
        }

        footer {
            margin-top: 32px;
            color: #a0aec0;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📅</div>
        <h1>AgendaPro</h1>
        <p class="subtitle">Sistema de Agendamento Profissional</p>

        <div class="error-msg" id="errorMsg">
            ⚠️ Erro ao fazer login. Tente novamente.
        </div>

        <a href="/auth/google" class="btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Entrar com Google
        </a>

        <div class="divider">acesso seguro</div>

        <div class="info">
            <strong>🔒 Login seguro via Google</strong><br>
            Use sua conta Gmail para acessar o sistema. Seus dados ficam protegidos.
        </div>

        <footer>AgendaPro &copy; 2026 — Todos os direitos reservados</footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('erro')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
