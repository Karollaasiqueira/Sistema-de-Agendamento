<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'">
    <title>Colaboradores — AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5YQQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .btn-add{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px 25px;border-radius:8px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:8px;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;}
        .modal-content{background:white;width:500px;margin:50px auto;padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.2);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .close{font-size:28px;cursor:pointer;color:#999;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;margin-bottom:5px;color:#666;font-weight:500;}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#667eea;}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;}
        .btn-edit{background:#ffc107;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;margin-right:5px;}
        .btn-toggle{background:#17a2b8;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
        .search-box{display:flex;gap:15px;margin-bottom:20px;}
        .search-box input{flex:1;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;}
        .search-box button{padding:12px 25px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;}
        .badge{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;}
        .badge-ativo{background:#d4edda;color:#155724;}
        .badge-inativo{background:#f8d7da;color:#721c24;}
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores" class="active"><i class="fas fa-user-md"></i> Colaboradores</a>
            </nav>
            <div class="sidebar-footer"><p>© 2026 AgendaPro</p></div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Gerenciar Colaboradores</h1>
                <div class="user-info">
                    <span>Olá, <strong id="userName">...</strong></span>
                    <i class="fas fa-user-circle"></i>
                    <button onclick="logout()" style="background:none;border:none;color:#dc3545;margin-left:10px;cursor:pointer;" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="section">
                <div class="section-header">
                    <h2>Lista de Profissionais</h2>
                    <button class="btn-add" onclick="abrirModalNovo()">
                        <i class="fas fa-plus"></i> Novo Colaborador
                    </button>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar por nome ou especialidade..." oninput="buscarColaboradores()">
                    <button onclick="buscarColaboradores()"><i class="fas fa-search"></i> Buscar</button>
                </div>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th><th>Nome</th><th>Especialidade</th>
                                <th>Telefone</th><th>Email</th><th>Status</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaColaboradores">
                            <tr><td colspan="7" class="text-center">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalColaborador" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Novo Colaborador</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <form id="formColaborador" onsubmit="salvarColaborador(event)">
                <input type="hidden" id="colaboradorId">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="nome" required maxlength="200">
                </div>
                <div class="form-group">
                    <label>Especialidade</label>
                    <input type="text" id="especialidade" maxlength="200">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="(11) 99999-9999" maxlength="20">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" maxlength="200">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="3" maxlength="500"></textarea>
                </div>
                <button type="submit" class="btn-submit">Salvar Colaborador</button>
            </form>
        </div>
    </div>

    <script src="/js/security.js"></script>
    <script>
        'use strict';
        let colaboradores = [];

        // CORRIGI M-04: verificar autenticação
        verificarAuth().then(user => { if (user) carregarColaboradores(); });

        async function carregarColaboradores() {
            try {
                const r = await fetch('/api/colaboradores');
                if (!r.ok) return;
                colaboradores = await r.json();
                exibirColaboradores(colaboradores);
            } catch (e) {
                document.getElementById('tabelaColaboradores').innerHTML =
                    '<tr><td colspan="7" class="text-center">Erro ao carregar dados</td></tr>';
            }
        }

        function exibirColaboradores(lista) {
            const tbody = document.getElementById('tabelaColaboradores');
            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nenhum colaborador encontrado</td></tr>';
                return;
            }
            // CORRIGI XSS: esc() em todos os campos dinâmicos
            tbody.innerHTML = lista.map(c => `<tr>
                <td>${esc(String(c.id))}</td>
                <td>${esc(c.nome)}</td>
                <td>${esc(c.especialidade)}</td>
                <td>${esc(c.telefone)}</td>
                <td>${esc(c.email)}</td>
                <td><span class="badge ${c.ativo ? 'badge-ativo' : 'badge-inativo'}">${c.ativo ? 'Ativo' : 'Inativo'}</span></td>
                <td>
                    <button class="btn-edit" onclick="editarColaborador(${Number(c.id)})"><i class="fas fa-edit"></i></button>
                    <button class="btn-toggle" onclick="toggleStatus(${Number(c.id)})">
                        <i class="fas ${c.ativo ? 'fa-times' : 'fa-check'}"></i>
                    </button>
                </td>
            </tr>`).join('');
        }

        function buscarColaboradores() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            if (!termo) { exibirColaboradores(colaboradores); return; }
            exibirColaboradores(colaboradores.filter(c =>
                (c.nome || '').toLowerCase().includes(termo) ||
                (c.especialidade || '').toLowerCase().includes(termo)
            ));
        }

        function abrirModalNovo() {
            document.getElementById('modalTitulo').textContent = 'Novo Colaborador';
            document.getElementById('formColaborador').reset();
            document.getElementById('colaboradorId').value = '';
            document.getElementById('modalColaborador').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modalColaborador').style.display = 'none'; }

        async function salvarColaborador(event) {
            event.preventDefault();
            const id = document.getElementById('colaboradorId').value;
            const payload = {
                nome: document.getElementById('nome').value.trim(),
                especialidade: document.getElementById('especialidade').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                email: document.getElementById('email').value.trim(),
                descricao: document.getElementById('descricao').value.trim()
            };
            try {
                const url = id ? `/api/colaboradores/${encodeURIComponent(id)}` : '/api/colaboradores';
                const method = id ? 'PUT' : 'POST';
                const r = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await r.json();
                if (!r.ok) { toast(data.erro || 'Erro ao salvar', 'erro'); return; }
                toast(id ? 'Colaborador atualizado!' : 'Colaborador cadastrado!', 'sucesso');
                fecharModal();
                carregarColaboradores();
            } catch (e) { toast('Erro de conexão', 'erro'); }
        }

        function editarColaborador(id) {
            const c = colaboradores.find(c => c.id === id);
            if (!c) return;
            document.getElementById('modalTitulo').textContent = 'Editar Colaborador';
            document.getElementById('colaboradorId').value = c.id;
            document.getElementById('nome').value = c.nome || '';
            document.getElementById('especialidade').value = c.especialidade || '';
            document.getElementById('telefone').value = c.telefone || '';
            document.getElementById('email').value = c.email || '';
            document.getElementById('descricao').value = c.descricao || '';
            document.getElementById('modalColaborador').style.display = 'block';
        }

        async function toggleStatus(id) {
            // CORRIGI: endpoint correto é PUT /api/colaboradores/:id com ativo no body
            const c = colaboradores.find(c => c.id === id);
            if (!c) return;
            if (!confirm(`${c.ativo ? 'Desativar' : 'Ativar'} este colaborador?`)) return;
            try {
                const r = await fetch(`/api/colaboradores/${encodeURIComponent(id)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: c.nome,
                        especialidade: c.especialidade,
                        telefone: c.telefone,
                        email: c.email,
                        descricao: c.descricao,
                        ativo: !c.ativo
                    })
                });
                const data = await r.json();
                if (!r.ok) { toast(data.erro || 'Erro', 'erro'); return; }
                toast('Status atualizado!', 'sucesso');
                carregarColaboradores();
            } catch (e) { toast('Erro de conexão', 'erro'); }
        }

        window.addEventListener('click', e => {
            if (e.target === document.getElementById('modalColaborador')) fecharModal();
        });
    </script>
</body>
</html>
