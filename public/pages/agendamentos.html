<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos - AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }
        
        .btn-add:hover {
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn-submit:hover {
            transform: scale(1.02);
        }
        
        .btn-status {
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
        }
        
        .btn-confirmar {
            background: #28a745;
            color: white;
        }
        
        .btn-cancelar {
            background: #dc3545;
            color: white;
        }
        
        .btn-concluir {
            background: #17a2b8;
            color: white;
        }
        
        .filtros {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filtros select, .filtros input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }
        
        .filtros button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }
        
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-confirmado { background: #d4edda; color: #155724; }
        .status-cancelado { background: #f8d7da; color: #721c24; }
        .status-concluido { background: #d1e7dd; color: #0f5132; }
        
        .acoes-status {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .calendar-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .calendar-day {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            min-height: 100px;
        }
        
        .calendar-day-header {
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        
        .calendar-event {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
            padding: 5px;
            margin-bottom: 5px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .calendar-event:hover {
            background: #bbdefb;
        }
        
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .view-toggle button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            border: 2px solid #e0e0e0;
        }
        
        .view-toggle button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos" class="active"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2026 AgendaPro</p>
                <p class="versao">Versão 2.1</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Gerenciar Agendamentos</h1>
                <div class="user-info">
                    <span>Olá, <strong>Administrador</strong></span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <div class="section">
                <div class="section-header">
                    <h2>Agenda</h2>
                    <button class="btn-add" onclick="abrirModalNovo()">
                        <i class="fas fa-plus"></i> Novo Agendamento
                    </button>
                </div>

                <div class="view-toggle">
                    <button class="active" onclick="mudarVisualizacao('lista')" id="btnLista">
                        <i class="fas fa-list"></i> Lista
                    </button>
                    <button onclick="mudarVisualizacao('calendario')" id="btnCalendario">
                        <i class="fas fa-calendar-alt"></i> Calendário
                    </button>
                </div>

                <div class="filtros">
                    <input type="date" id="filtroData" onchange="aplicarFiltros()">
                    <select id="filtroStatus" onchange="aplicarFiltros()">
                        <option value="">Todos os status</option>
                        <option value="pendente">Pendente</option>
                        <option value="confirmado">Confirmado</option>
                        <option value="concluido">Concluído</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                    <select id="filtroCliente" onchange="aplicarFiltros()">
                        <option value="">Todos os clientes</option>
                    </select>
                    <button onclick="limparFiltros()"><i class="fas fa-times"></i> Limpar</button>
                </div>

                <!-- Visualização em Lista -->
                <div id="viewLista">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Cliente</th>
                                    <th>Serviço</th>
                                    <th>Data</th>
                                    <th>Hora</th>
                                    <th>Status</th>
                                    <th>Observações</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaAgendamentos">
                                <tr>
                                    <td colspan="7" class="text-center">Carregando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Visualização em Calendário -->
                <div id="viewCalendario" style="display: none;">
                    <div class="calendar-view" id="calendario">
                        <!-- Calendário será gerado via JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Agendamento -->
    <div id="modalAgendamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Novo Agendamento</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
                <input type="hidden" id="agendamentoId">
                <div class="form-group">
                    <label>Cliente *</label>
                    <select id="clienteId" required>
                        <option value="">Selecione um cliente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Serviço *</label>
                    <select id="servicoId" required onchange="atualizarPreco()">
                        <option value="">Selecione um serviço</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data *</label>
                    <input type="date" id="dataAgendamento" required min="">
                </div>
                <div class="form-group">
                    <label>Hora *</label>
                    <input type="time" id="horaAgendamento" required>
                </div>
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="3" placeholder="Observações sobre o agendamento..."></textarea>
                </div>
                <div class="form-group">
                    <label>Valor do Serviço</label>
                    <input type="text" id="valorServico" readonly disabled>
                </div>
                <button type="submit" class="btn-submit">Salvar Agendamento</button>
            </form>
        </div>
    </div>

    <script>
        let agendamentos = [];
        let clientes = [];
        let servicos = [];
        let visualizacaoAtual = 'lista';
        
        async function carregarDados() {
            await Promise.all([
                carregarClientes(),
                carregarServicos(),
                carregarAgendamentos()
            ]);
        }
        
        async function carregarClientes() {
            try {
                const response = await fetch('/api/clientes');
                clientes = await response.json();
                
                const selectCliente = document.getElementById('clienteId');
                const filtroCliente = document.getElementById('filtroCliente');
                
                selectCliente.innerHTML = '<option value="">Selecione um cliente</option>';
                filtroCliente.innerHTML = '<option value="">Todos os clientes</option>';
                
                clientes.forEach(c => {
                    selectCliente.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
                    filtroCliente.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
                });
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
            }
        }
        
        async function carregarServicos() {
            try {
                const response = await fetch('/api/servicos');
                servicos = await response.json();
                
                const selectServico = document.getElementById('servicoId');
                selectServico.innerHTML = '<option value="">Selecione um serviço</option>';
                
                servicos.filter(s => s.ativo).forEach(s => {
                    selectServico.innerHTML += `<option value="${s.id}" data-preco="${s.preco}">${s.nome} - R$ ${parseFloat(s.preco).toFixed(2)}</option>`;
                });
            } catch (error) {
                console.error('Erro ao carregar serviços:', error);
            }
        }
        
        async function carregarAgendamentos() {
            try {
                const response = await fetch('/api/agendamentos');
                agendamentos = await response.json();
                
                if (visualizacaoAtual === 'lista') {
                    exibirAgendamentos();
                } else {
                    exibirCalendario();
                }
            } catch (error) {
                console.error('Erro ao carregar agendamentos:', error);
                document.getElementById('tabelaAgendamentos').innerHTML = 
                    '<tr><td colspan="7" class="text-center text-danger">Erro ao carregar dados</td></tr>';
            }
        }
        
        function exibirAgendamentos() {
            const tbody = document.getElementById('tabelaAgendamentos');
            
            if (agendamentos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nenhum agendamento encontrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = agendamentos.map(a => `
                <tr>
                    <td>${a.cliente_nome || '---'}</td>
                    <td>${a.servico_nome || '---'}</td>
                    <td>${new Date(a.data_agendamento).toLocaleDateString('pt-BR')}</td>
                    <td>${a.hora_agendamento}</td>
                    <td><span class="status status-${a.status}">${a.status}</span></td>
                    <td>${a.observacoes || '---'}</td>
                    <td>
                        <div class="acoes-status">
                            ${a.status === 'pendente' ? `
                                <button class="btn-status btn-confirmar" onclick="atualizarStatus(${a.id}, 'confirmado')">
                                    <i class="fas fa-check"></i> Confirmar
                                </button>
                                <button class="btn-status btn-cancelar" onclick="atualizarStatus(${a.id}, 'cancelado')">
                                    <i class="fas fa-times"></i> Cancelar
                                </button>
                            ` : ''}
                            ${a.status === 'confirmado' ? `
                                <button class="btn-status btn-concluir" onclick="atualizarStatus(${a.id}, 'concluido')">
                                    <i class="fas fa-check-double"></i> Concluir
                                </button>
                                <button class="btn-status btn-cancelar" onclick="atualizarStatus(${a.id}, 'cancelado')">
                                    <i class="fas fa-times"></i> Cancelar
                                </button>
                            ` : ''}
                            <button class="btn-edit" onclick="editarAgendamento(${a.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function exibirCalendario() {
            const calendario = document.getElementById('calendario');
            const hoje = new Date();
            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            
            let html = '';
            const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            
            // Cabeçalho
            diasSemana.forEach(dia => {
                html += `<div class="calendar-day-header">${dia}</div>`;
            });
            
            // Dias vazios do início do mês
            for (let i = 0; i < primeiroDia.getDay(); i++) {
                html += '<div class="calendar-day"></div>';
            }
            
            // Dias do mês
            for (let dia = 1; dia <= ultimoDia.getDate(); dia++) {
                const dataStr = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const agendamentosDia = agendamentos.filter(a => a.data_agendamento === dataStr);
                
                html += `<div class="calendar-day">`;
                html += `<div class="calendar-day-number">${dia}</div>`;
                
                agendamentosDia.forEach(a => {
                    html += `
                        <div class="calendar-event" onclick="editarAgendamento(${a.id})">
                            <strong>${a.hora_agendamento}</strong> - ${a.cliente_nome}<br>
                            <small>${a.servico_nome}</small>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            calendario.innerHTML = html;
        }
        
        function mudarVisualizacao(tipo) {
            visualizacaoAtual = tipo;
            
            document.getElementById('btnLista').classList.toggle('active', tipo === 'lista');
            document.getElementById('btnCalendario').classList.toggle('active', tipo === 'calendario');
            
            document.getElementById('viewLista').style.display = tipo === 'lista' ? 'block' : 'none';
            document.getElementById('viewCalendario').style.display = tipo === 'calendario' ? 'block' : 'none';
            
            if (tipo === 'calendario') {
                exibirCalendario();
            }
        }
        
        function aplicarFiltros() {
            const data = document.getElementById('filtroData').value;
            const status = document.getElementById('filtroStatus').value;
            const clienteId = document.getElementById('filtroCliente').value;
            
            let filtrados = [...agendamentos];
            
            if (data) {
                filtrados = filtrados.filter(a => a.data_agendamento === data);
            }
            
            if (status) {
                filtrados = filtrados.filter(a => a.status === status);
            }
            
            if (clienteId) {
                filtrados = filtrados.filter(a => a.cliente_id == clienteId);
            }
            
            if (visualizacaoAtual === 'lista') {
                const tbody = document.getElementById('tabelaAgendamentos');
                if (filtrados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nenhum agendamento encontrado</td></tr>';
                } else {
                    tbody.innerHTML = filtrados.map(a => `
                        <tr>
                            <td>${a.cliente_nome || '---'}</td>
                            <td>${a.servico_nome || '---'}</td>
                            <td>${new Date(a.data_agendamento).toLocaleDateString('pt-BR')}</td>
                            <td>${a.hora_agendamento}</td>
                            <td><span class="status status-${a.status}">${a.status}</span></td>
                            <td>${a.observacoes || '---'}</td>
                            <td>
                                <div class="acoes-status">
                                    ${a.status === 'pendente' ? `
                                        <button class="btn-status btn-confirmar" onclick="atualizarStatus(${a.id}, 'confirmado')">
                                            <i class="fas fa-check"></i>
                                        </button>
                                        <button class="btn-status btn-cancelar" onclick="atualizarStatus(${a.id}, 'cancelado')">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    ` : ''}
                                    ${a.status === 'confirmado' ? `
                                        <button class="btn-status btn-concluir" onclick="atualizarStatus(${a.id}, 'concluido')">
                                            <i class="fas fa-check-double"></i>
                                        </button>
                                        <button class="btn-status btn-cancelar" onclick="atualizarStatus(${a.id}, 'cancelado')">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    ` : ''}
                                    <button class="btn-edit" onclick="editarAgendamento(${a.id})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            }
        }
        
        function limparFiltros() {
            document.getElementById('filtroData').value = '';
            document.getElementById('filtroStatus').value = '';
            document.getElementById('filtroCliente').value = '';
            aplicarFiltros();
        }
        
        function abrirModalNovo() {
            document.getElementById('modalTitulo').textContent = 'Novo Agendamento';
            document.getElementById('formAgendamento').reset();
            document.getElementById('agendamentoId').value = '';
            
            // Data mínima é hoje
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataAgendamento').min = hoje;
            
            document.getElementById('modalAgendamento').style.display = 'block';
        }
        
        function fecharModal() {
            document.getElementById('modalAgendamento').style.display = 'none';
        }
        
        function atualizarPreco() {
            const select = document.getElementById('servicoId');
            const option = select.options[select.selectedIndex];
            const preco = option.dataset.preco;
            
            if (preco) {
                document.getElementById('valorServico').value = `R$ ${parseFloat(preco).toFixed(2)}`;
            } else {
                document.getElementById('valorServico').value = '';
            }
        }
        
        async function salvarAgendamento(event) {
            event.preventDefault();
            
            const id = document.getElementById('agendamentoId').value;
            const agendamento = {
                cliente_id: document.getElementById('clienteId').value,
                servico_id: document.getElementById('servicoId').value,
                data_agendamento: document.getElementById('dataAgendamento').value,
                hora_agendamento: document.getElementById('horaAgendamento').value,
                observacoes: document.getElementById('observacoes').value
            };
            
            try {
                if (id) {
                    await fetch(`/api/agendamentos/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(agendamento)
                    });
                    alert('✅ Agendamento atualizado com sucesso!');
                } else {
                    await fetch('/api/agendamentos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(agendamento)
                    });
                    alert('✅ Agendamento criado com sucesso!');
                }
                
                fecharModal();
                carregarAgendamentos();
            } catch (error) {
                alert('Erro ao salvar agendamento');
            }
        }
        
        function editarAgendamento(id) {
            const agendamento = agendamentos.find(a => a.id === id);
            if (!agendamento) return;
            
            document.getElementById('modalTitulo').textContent = 'Editar Agendamento';
            document.getElementById('agendamentoId').value = agendamento.id;
            document.getElementById('clienteId').value = agendamento.cliente_id;
            document.getElementById('servicoId').value = agendamento.servico_id;
            document.getElementById('dataAgendamento').value = agendamento.data_agendamento;
            document.getElementById('horaAgendamento').value = agendamento.hora_agendamento;
            document.getElementById('observacoes').value = agendamento.observacoes || '';
            
            atualizarPreco();
            document.getElementById('modalAgendamento').style.display = 'block';
        }
        
        async function atualizarStatus(id, novoStatus) {
            if (!confirm(`Tem certeza que deseja ${novoStatus} este agendamento?`)) return;
            
            try {
                await fetch(`/api/agendamentos/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: novoStatus })
                });
                alert(`✅ Agendamento ${novoStatus} com sucesso!`);
                carregarAgendamentos();
            } catch (error) {
                alert('Erro ao atualizar status');
            }
        }
        
        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('modalAgendamento');
            if (event.target === modal) {
                fecharModal();
            }
        }
        
        // Carregar dados ao iniciar
        carregarDados();
    </script>
</body>
</html>
