<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: lh3.googleusercontent.com; connect-src 'self'">
    <title>Agendamentos — AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5YQQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .btn-add{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px 25px;border-radius:8px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:8px;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;}
        .modal-content{background:white;width:600px;margin:50px auto;padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.2);max-height:80vh;overflow-y:auto;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .close{font-size:28px;cursor:pointer;color:#999;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;margin-bottom:5px;color:#666;font-weight:500;}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea;}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;}
        .btn-status{border:none;padding:5px 10px;border-radius:5px;cursor:pointer;margin:2px;font-size:12px;}
        .btn-confirmar{background:#28a745;color:white;}
        .btn-cancelar{background:#dc3545;color:white;}
        .btn-concluir{background:#17a2b8;color:white;}
        .btn-edit{background:#ffc107;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
        .filtros{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
        .filtros select,.filtros input{padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;flex:1;min-width:200px;}
        .filtros button{padding:10px 20px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;}
        .status{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;display:inline-block;}
        .status-pendente{background:#fff3cd;color:#856404;}
        .status-confirmado{background:#d4edda;color:#155724;}
        .status-cancelado{background:#f8d7da;color:#721c24;}
        .status-concluido{background:#d1e7dd;color:#0f5132;}
        .acoes-status{display:flex;gap:5px;flex-wrap:wrap;}
        .view-toggle{display:flex;gap:10px;margin-bottom:20px;}
        .view-toggle button{padding:10px 20px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;background:white;}
        .view-toggle button.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;}
        .calendar-view{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:20px;}
        .calendar-day{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:10px;min-height:100px;}
        .calendar-day-header{font-weight:600;color:#333;border-bottom:1px solid #e0e0e0;padding-bottom:5px;margin-bottom:5px;}
        .calendar-event{background:#e3f2fd;border-left:3px solid #2196f3;padding:5px;margin-bottom:5px;font-size:12px;border-radius:3px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos" class="active"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores"><i class="fas fa-user-md"></i> Colaboradores</a>
            </nav>
            <div class="sidebar-footer"><p>© 2026 AgendaPro</p></div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Gerenciar Agendamentos</h1>
                <div class="user-info">
                    <span>Olá, <strong id="userName">...</strong></span>
                    <i class="fas fa-user-circle"></i>
                    <button onclick="logout()" style="background:none;border:none;color:#dc3545;margin-left:10px;cursor:pointer;" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="section">
                <div class="section-header">
                    <h2>Agenda</h2>
                    <button class="btn-add" onclick="abrirModalNovo()">
                        <i class="fas fa-plus"></i> Novo Agendamento
                    </button>
                </div>

                <div class="view-toggle">
                    <button class="active" onclick="mudarVisualizacao('lista')" id="btnLista">
                        <i class="fas fa-list"></i> Lista
                    </button>
                    <button onclick="mudarVisualizacao('calendario')" id="btnCalendario">
                        <i class="fas fa-calendar-alt"></i> Calendário
                    </button>
                </div>

                <div class="filtros">
                    <input type="date" id="filtroData" onchange="aplicarFiltros()">
                    <select id="filtroStatus" onchange="aplicarFiltros()">
                        <option value="">Todos os status</option>
                        <option value="pendente">Pendente</option>
                        <option value="confirmado">Confirmado</option>
                        <option value="concluido">Concluído</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                    <select id="filtroCliente" onchange="aplicarFiltros()">
                        <option value="">Todos os clientes</option>
                    </select>
                    <button onclick="limparFiltros()"><i class="fas fa-times"></i> Limpar</button>
                </div>

                <div id="viewLista">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Cliente</th><th>Serviço</th><th>Data</th>
                                    <th>Hora</th><th>Status</th><th>Observações</th><th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaAgendamentos">
                                <tr><td colspan="7" class="text-center">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="viewCalendario" style="display:none;">
                    <div class="calendar-view" id="calendario"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modalAgendamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Novo Agendamento</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
                <input type="hidden" id="agendamentoId">
                <div class="form-group">
                    <label>Cliente *</label>
                    <select id="clienteId" required><option value="">Selecione um cliente</option></select>
                </div>
                <div class="form-group">
                    <label>Serviço *</label>
                    <select id="servicoId" required onchange="atualizarPreco()">
                        <option value="">Selecione um serviço</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data *</label>
                    <input type="date" id="dataAgendamento" required>
                </div>
                <div class="form-group">
                    <label>Hora *</label>
                    <input type="time" id="horaAgendamento" required>
                </div>
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="3" maxlength="1000"></textarea>
                </div>
                <div class="form-group">
                    <label>Valor do Serviço</label>
                    <input type="text" id="valorServico" readonly disabled>
                </div>
                <button type="submit" class="btn-submit">Salvar Agendamento</button>
            </form>
        </div>
    </div>

    <script src="/js/security.js"></script>
    <script>
        'use strict';
        let agendamentos = [], clientes = [], servicos = [];
        let visualizacaoAtual = 'lista';

        // CORRIGI M-04: verificar autenticação
        verificarAuth().then(user => { if (user) carregarDados(); });

        async function carregarDados() {
            await Promise.all([carregarClientes(), carregarServicos(), carregarAgendamentos()]);
        }

        async function carregarClientes() {
            try {
                const r = await fetch('/api/clientes');
                if (!r.ok) return;
                clientes = await r.json();
                const sel = document.getElementById('clienteId');
                const filtro = document.getElementById('filtroCliente');
                // CORRIGI A-02: esc() nos nomes dos clientes nos selects
                clientes.forEach(c => {
                    const opt1 = new Option(esc(c.nome), c.id);
                    const opt2 = new Option(esc(c.nome), c.id);
                    sel.add(opt1);
                    filtro.add(opt2);
                });
            } catch (e) { console.error('Erro ao carregar clientes'); }
        }

        async function carregarServicos() {
            try {
                const r = await fetch('/api/servicos');
                if (!r.ok) return;
                servicos = await r.json();
                const sel = document.getElementById('servicoId');
                servicos.filter(s => s.ativo).forEach(s => {
                    const opt = new Option(`${esc(s.nome)} — R$ ${parseFloat(s.preco).toFixed(2)}`, s.id);
                    opt.dataset.preco = s.preco;
                    sel.add(opt);
                });
            } catch (e) { console.error('Erro ao carregar serviços'); }
        }

        async function carregarAgendamentos() {
            try {
                const r = await fetch('/api/agendamentos');
                if (!r.ok) return;
                agendamentos = await r.json();
                if (visualizacaoAtual === 'lista') exibirAgendamentos(agendamentos);
                else exibirCalendario();
            } catch (e) {
                document.getElementById('tabelaAgendamentos').innerHTML =
                    '<tr><td colspan="7" class="text-center">Erro ao carregar dados</td></tr>';
            }
        }

        function linhaAgendamento(a) {
            // CORRIGI A-02: esc() em todos os campos + statusSeguro() para classes CSS
            const st = statusSeguro(a.status);
            return `<tr>
                <td>${esc(a.cliente_nome)}</td>
                <td>${esc(a.servico_nome)}</td>
                <td>${esc(new Date(a.data_agendamento).toLocaleDateString('pt-BR'))}</td>
                <td>${esc(a.hora_agendamento)}</td>
                <td><span class="status status-${st}">${esc(a.status)}</span></td>
                <td>${esc(a.observacoes)}</td>
                <td>
                    <div class="acoes-status">
                        ${a.status === 'pendente' ? `
                            <button class="btn-status btn-confirmar" onclick="atualizarStatus(${Number(a.id)},'confirmado')"><i class="fas fa-check"></i></button>
                            <button class="btn-status btn-cancelar" onclick="atualizarStatus(${Number(a.id)},'cancelado')"><i class="fas fa-times"></i></button>
                        ` : ''}
                        ${a.status === 'confirmado' ? `
                            <button class="btn-status btn-concluir" onclick="atualizarStatus(${Number(a.id)},'concluido')"><i class="fas fa-check-double"></i></button>
                            <button class="btn-status btn-cancelar" onclick="atualizarStatus(${Number(a.id)},'cancelado')"><i class="fas fa-times"></i></button>
                        ` : ''}
                        <button class="btn-edit" onclick="editarAgendamento(${Number(a.id)})"><i class="fas fa-edit"></i></button>
                    </div>
                </td>
            </tr>`;
        }

        function exibirAgendamentos(lista) {
            const tbody = document.getElementById('tabelaAgendamentos');
            if (!lista.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nenhum agendamento encontrado</td></tr>';
                return;
            }
            tbody.innerHTML = lista.map(linhaAgendamento).join('');
        }

        function exibirCalendario() {
            const calendario = document.getElementById('calendario');
            const hoje = new Date();
            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
            let html = diasSemana.map(d => `<div class="calendar-day-header">${esc(d)}</div>`).join('');
            for (let i = 0; i < primeiroDia.getDay(); i++) html += '<div class="calendar-day"></div>';
            for (let dia = 1; dia <= ultimoDia.getDate(); dia++) {
                const dataStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                const ags = agendamentos.filter(a => a.data_agendamento === dataStr);
                html += `<div class="calendar-day"><div class="calendar-day-number">${dia}</div>`;
                ags.forEach(a => {
                    // CORRIGI A-02: esc() nos dados do calendário
                    html += `<div class="calendar-event" onclick="editarAgendamento(${Number(a.id)})">
                        <strong>${esc(a.hora_agendamento)}</strong> — ${esc(a.cliente_nome)}<br>
                        <small>${esc(a.servico_nome)}</small>
                    </div>`;
                });
                html += '</div>';
            }
            calendario.innerHTML = html;
        }

        function mudarVisualizacao(tipo) {
            visualizacaoAtual = tipo;
            document.getElementById('btnLista').classList.toggle('active', tipo === 'lista');
            document.getElementById('btnCalendario').classList.toggle('active', tipo === 'calendario');
            document.getElementById('viewLista').style.display = tipo === 'lista' ? 'block' : 'none';
            document.getElementById('viewCalendario').style.display = tipo === 'calendario' ? 'block' : 'none';
            if (tipo === 'calendario') exibirCalendario();
        }

        function aplicarFiltros() {
            const data = document.getElementById('filtroData').value;
            const status = document.getElementById('filtroStatus').value;
            const clienteId = document.getElementById('filtroCliente').value;
            let filtrados = [...agendamentos];
            if (data) filtrados = filtrados.filter(a => a.data_agendamento === data);
            if (status && STATUS_AGENDAMENTO[status]) filtrados = filtrados.filter(a => a.status === status);
            if (clienteId) filtrados = filtrados.filter(a => String(a.cliente_id) === clienteId);
            exibirAgendamentos(filtrados);
        }

        function limparFiltros() {
            document.getElementById('filtroData').value = '';
            document.getElementById('filtroStatus').value = '';
            document.getElementById('filtroCliente').value = '';
            exibirAgendamentos(agendamentos);
        }

        function abrirModalNovo() {
            document.getElementById('modalTitulo').textContent = 'Novo Agendamento';
            document.getElementById('formAgendamento').reset();
            document.getElementById('agendamentoId').value = '';
            document.getElementById('dataAgendamento').min = new Date().toISOString().split('T')[0];
            document.getElementById('modalAgendamento').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modalAgendamento').style.display = 'none'; }

        function atualizarPreco() {
            const sel = document.getElementById('servicoId');
            const opt = sel.options[sel.selectedIndex];
            document.getElementById('valorServico').value = opt.dataset.preco
                ? `R$ ${parseFloat(opt.dataset.preco).toFixed(2)}`
                : '';
        }

        async function salvarAgendamento(event) {
            event.preventDefault();
            const id = document.getElementById('agendamentoId').value;
            const payload = {
                cliente_id: document.getElementById('clienteId').value,
                servico_id: document.getElementById('servicoId').value,
                data_agendamento: document.getElementById('dataAgendamento').value,
                hora_agendamento: document.getElementById('horaAgendamento').value,
                observacoes: document.getElementById('observacoes').value.trim()
            };
            try {
                const url = id ? `/api/agendamentos/${encodeURIComponent(id)}` : '/api/agendamentos';
                const method = id ? 'PUT' : 'POST';
                const r = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await r.json();
                if (!r.ok) { toast(data.erro || 'Erro ao salvar', 'erro'); return; }
                toast(id ? 'Agendamento atualizado!' : 'Agendamento criado!', 'sucesso');
                fecharModal();
                carregarAgendamentos();
            } catch (e) { toast('Erro de conexão', 'erro'); }
        }

        function editarAgendamento(id) {
            const a = agendamentos.find(a => a.id === id);
            if (!a) return;
            document.getElementById('modalTitulo').textContent = 'Editar Agendamento';
            document.getElementById('agendamentoId').value = a.id;
            document.getElementById('clienteId').value = a.cliente_id;
            document.getElementById('servicoId').value = a.servico_id;
            document.getElementById('dataAgendamento').value = a.data_agendamento;
            document.getElementById('horaAgendamento').value = a.hora_agendamento;
            document.getElementById('observacoes').value = a.observacoes || '';
            atualizarPreco();
            document.getElementById('modalAgendamento').style.display = 'block';
        }

        async function atualizarStatus(id, novoStatus) {
            // CORRIGI A-02, B-02: endpoint correto é PUT /api/agendamentos/:id (não /status)
            if (!STATUS_AGENDAMENTO[novoStatus]) return;
            if (!confirm(`Confirmar: ${novoStatus} este agendamento?`)) return;
            try {
                const r = await fetch(`/api/agendamentos/${encodeURIComponent(id)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: novoStatus })
                });
                const data = await r.json();
                if (!r.ok) { toast(data.erro || 'Erro', 'erro'); return; }
                toast(`Agendamento ${novoStatus}!`, 'sucesso');
                carregarAgendamentos();
            } catch (e) { toast('Erro de conexão', 'erro'); }
        }

        window.addEventListener('click', e => {
            if (e.target === document.getElementById('modalAgendamento')) fecharModal();
        });
    </script>
</body>
</html>
