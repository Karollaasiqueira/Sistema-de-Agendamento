<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores - AgendaPro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }
        .btn-add:hover { transform: scale(1.05); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-edit {
            background: #ffc107;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-toggle {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .search-box button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-ativo {
            background: #d4edda;
            color: #155724;
        }
        .badge-inativo {
            background: #f8d7da;
            color: #721c24;
        }
        .servicos-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #0d47a1;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <span>AgendaPro</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
                <a href="/agendamentos"><i class="fas fa-calendar"></i> Agendamentos</a>
                <a href="/servicos"><i class="fas fa-cut"></i> Serviços</a>
                <a href="/colaboradores" class="active"><i class="fas fa-user-md"></i> Colaboradores</a>
                <a href="/configuracoes"><i class="fas fa-cog"></i> WhatsApp</a>
                <a href="/configuracoes-avancadas"><i class="fas fa-sliders-h"></i> Avançado</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Gerenciar Colaboradores</h1>
                <div class="user-info">
                    <span>Olá, <strong>Administrador</strong></span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <div class="section">
                <div class="section-header">
                    <h2>Lista de Profissionais</h2>
                    <button class="btn-add" onclick="abrirModalNovo()">
                        <i class="fas fa-plus"></i> Novo Colaborador
                    </button>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar por nome ou especialidade...">
                    <button onclick="buscarColaboradores()"><i class="fas fa-search"></i> Buscar</button>
                </div>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Especialidade</th>
                                <th>Telefone</th>
                                <th>Email</th>
                                <th>Serviços</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaColaboradores">
                            <tr><td colspan="8" class="text-center">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Colaborador -->
    <div id="modalColaborador" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Novo Colaborador</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <form id="formColaborador" onsubmit="salvarColaborador(event)">
                <input type="hidden" id="colaboradorId">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Especialidade</label>
                    <input type="text" id="especialidade">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="3" placeholder="Breve descrição do profissional..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Salvar Colaborador</button>
            </form>
        </div>
    </div>

    <!-- Modal de Vínculo de Serviços -->
    <div id="modalVinculo" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Vincular Serviços</h2>
                <span class="close" onclick="fecharModalVinculo()">&times;</span>
            </div>
            <div id="vinculoContainer"></div>
            <button onclick="salvarVinculos()" class="btn-submit" style="margin-top:20px;">Salvar Vínculos</button>
        </div>
    </div>

    <script>
        let colaboradores = [];
        let servicos = [];
        let vinculosAtuais = [];
        let colaboradorSelecionado = null;

        async function carregarColaboradores() {
            const r = await fetch('/api/colaboradores');
            colaboradores = await r.json();
            exibirColaboradores(colaboradores);
        }

        async function carregarServicos() {
            const r = await fetch('/api/servicos');
            servicos = await r.json();
        }

        function exibirColaboradores(lista) {
            const tbody = document.getElementById('tabelaColaboradores');
            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">Nenhum colaborador encontrado</td></tr>';
                return;
            }
            tbody.innerHTML = lista.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.nome}</td>
                    <td>${c.especialidade || '---'}</td>
                    <td>${c.telefone || '---'}</td>
                    <td>${c.email || '---'}</td>
                    <td><button class="btn-edit" onclick="abrirVinculo(${c.id})">Vincular</button></td>
                    <td><span class="badge ${c.ativo ? 'badge-ativo' : 'badge-inativo'}">${c.ativo ? 'Ativo' : 'Inativo'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editarColaborador(${c.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-toggle" onclick="toggleStatus(${c.id})"><i class="fas ${c.ativo ? 'fa-times' : 'fa-check'}"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function buscarColaboradores() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            if (!termo) return exibirColaboradores(colaboradores);
            const filtrados = colaboradores.filter(c => c.nome.toLowerCase().includes(termo) || (c.especialidade || '').toLowerCase().includes(termo));
            exibirColaboradores(filtrados);
        }

        function abrirModalNovo() {
            document.getElementById('modalTitulo').textContent = 'Novo Colaborador';
            document.getElementById('formColaborador').reset();
            document.getElementById('colaboradorId').value = '';
            document.getElementById('modalColaborador').style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('modalColaborador').style.display = 'none';
        }

        async function salvarColaborador(e) {
            e.preventDefault();
            const id = document.getElementById('colaboradorId').value;
            const payload = {
                nome: document.getElementById('nome').value,
                especialidade: document.getElementById('especialidade').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value,
                descricao: document.getElementById('descricao').value
            };
            if (id) {
                await fetch(`/api/colaboradores/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                alert('✅ Colaborador atualizado');
            } else {
                await fetch('/api/colaboradores', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                alert('✅ Colaborador cadastrado');
            }
            fecharModal();
            carregarColaboradores();
        }

        function editarColaborador(id) {
            const c = colaboradores.find(c => c.id === id);
            if (!c) return;
            document.getElementById('modalTitulo').textContent = 'Editar Colaborador';
            document.getElementById('colaboradorId').value = c.id;
            document.getElementById('nome').value = c.nome;
            document.getElementById('especialidade').value = c.especialidade || '';
            document.getElementById('telefone').value = c.telefone || '';
            document.getElementById('email').value = c.email || '';
            document.getElementById('descricao').value = c.descricao || '';
            document.getElementById('modalColaborador').style.display = 'block';
        }

        async function toggleStatus(id) {
            if (!confirm('Alterar status do colaborador?')) return;
            await fetch(`/api/colaboradores/${id}/toggle`, { method: 'PUT' });
            carregarColaboradores();
        }

        async function abrirVinculo(colaboradorId) {
            colaboradorSelecionado = colaboradorId;
            const r = await fetch(`/api/servico/0/colaboradores`); // todos serviços
            const servicos = await r.json();
            const r2 = await fetch(`/api/colaborador/${colaboradorId}/servicos`);
            const vinculos = await r2.json();
            const idsVinculados = vinculos.map(v => v.id);
            let html = '<h3>Selecione os serviços deste profissional</h3>';
            servicos.forEach(s => {
                html += `<label style="display:block; margin:8px;"><input type="checkbox" class="vinculo-check" value="${s.id}" ${idsVinculados.includes(s.id) ? 'checked' : ''}> ${s.nome}</label>`;
            });
            document.getElementById('vinculoContainer').innerHTML = html;
            document.getElementById('modalVinculo').style.display = 'block';
        }

        async function salvarVinculos() {
            const checks = document.querySelectorAll('.vinculo-check:checked');
            const servicosSelecionados = Array.from(checks).map(c => parseInt(c.value));
            for (let servicoId of servicosSelecionados) {
                await fetch('/api/colaborador-servico', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ colaborador_id: colaboradorSelecionado, servico_id: servicoId })
                });
            }
            alert('✅ Vínculos atualizados');
            fecharModalVinculo();
        }

        function fecharModalVinculo() {
            document.getElementById('modalVinculo').style.display = 'none';
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) e.target.style.display = 'none';
        };

        carregarColaboradores();
        carregarServicos();
    </script>
</body>
</html>
